name: Rule Tests

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
    paths:
      - 'rules/**'
      - 'pkg/**'
      - 'go.mod'
      - 'go.sum'

jobs:
  unit-tests:
    name: Unit Tests
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-go@v5
        with:
          go-version-file: 'go.mod'
          cache: true

      - name: Run tests
        run: go test ./... -v -count=1 -race

  validate-fixtures:
    name: Validate Rule Fixtures
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-go@v5
        with:
          go-version-file: 'go.mod'
          cache: true

      - name: Validate fixture YAML files
        run: |
          go test ./pkg/testing/ -run TestDryRun_SampleFixtureFile -v
          go test ./pkg/testing/ -run TestParse_SampleFixtureFile -v
