name: Test Minder Rules

on:
  pull_request:
    paths:
      - 'rules/**'
      - 'pkg/**'
      - 'go.mod'
      - 'go.sum'

jobs:
  unit-tests:
    name: Unit Tests
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Setup Go
        uses: actions/setup-go@v5
        with:
          go-version-file: 'go.mod'
          cache: true

      - name: Run fixture parser and mock tests
        run: go test ./... -v -count=1 -race

  validate-fixtures:
    name: Validate Rule Fixtures
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Setup Go
        uses: actions/setup-go@v5
        with:
          go-version-file: 'go.mod'
          cache: true

      - name: Install mindev CLI
        # NOTE: -t / --token is already taken by rttst.go.  Once the
        # --fixture flag is merged upstream, replace the go test invocation
        # below with:
        #   find ./rules -name "*_test.yaml" | xargs -I{} mindev ruletype test --fixture {}
        run: go install github.com/mindersec/minder/cmd/dev@latest

      - name: Parse all fixture files (offline validation)
        # Until --fixture lands in mindev, run the fixture parser directly as a
        # Go test so every *_test.yaml under rules/ is parsed and validated.
        run: |
          go test ./pkg/testing/... -v -count=1 -run TestParse_SampleFixtureFile
