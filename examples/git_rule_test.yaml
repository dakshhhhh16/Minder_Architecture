version: v1
rule_name: osps-vm-05
test_cases:
  - name: "Pass when SECURITY.md exists with reporting info"
    expect: pass
    def: {}
    params: {}
    entity:
      type: repository
      entity:
        owner: "testowner"
        name: "testrepo"
    mock_data:
      git_files:
        "SECURITY.md": "Please report vulnerabilities to security@example.com"

  - name: "Pass when GitHub private vulnerability reporting is enabled"
    expect: pass
    def: {}
    params: {}
    entity:
      type: repository
      entity:
        owner: "testowner"
        name: "testrepo"
    mock_data:
      http_responses:
        "https://api.github.com/repos/testowner/testrepo/vulnerability-alerts":
          status_code: 200
          body: '{"enabled": true}'

  - name: "Fail when no security file and reporting is disabled"
    expect: fail
    def: {}
    params: {}
    entity:
      type: repository
      entity:
        owner: "testowner"
        name: "testrepo"
    mock_data:
      git_files:
        "README.md": "Just a normal readme."
      http_responses:
        "https://api.github.com/repos/testowner/testrepo/vulnerability-alerts":
          status_code: 404
          body: '{"message": "Not Found"}'
